<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>WorthyTen - Select Additional Lens</title>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="css/style.css" rel="stylesheet"/>
<script src="js/logger.js"></script>
<script src="js/config.js"></script>
<script src="js/category-config.js"></script>
<script src="js/variant-config.js"></script>
<script src="js/display-helper.js"></script>
</head>
<body data-step="4">
<div id="header"></div>
<div class="steps-bar-track"><div class="steps-bar-fill" id="stepsFill"></div></div>

<script src="js/header.js"></script>
<script src="js/ui.js"></script>
<div class="main-container">

  <div class="assessment-layout">

    <div class="assessment-card">
      <div class="product-header">
      <a class="back-button" href="#" id="backToAssessment">← Back</a>
      <h1 class="page-title" style="text-align: center; margin-bottom: 30px;">Select your additional lens</h1>
      </div>
      <div class="assessment-body">
        <p class="muted" style="margin-bottom: 20px;">Select your device additional lens</p>
        
        <!-- Search Input for Lenses -->
        <div class="search-container" style="margin-bottom: 20px;">
          <input type="text" id="lensSearchInput" class="form-input" placeholder="🔍 Search for a lens..." style="width: 100%; padding: 12px 16px; font-size: 16px; border: 2px solid #e0e0e0; border-radius: 12px;">
        </div>
        
        <div class="lens-selection-container">
          <div class="lens-category">
            <h3 class="lens-category-title">DSLR Camera Lens</h3>
            <div class="lens-dropdown-container">
              <select id="lensSelect" class="lens-select" multiple size="6">
                <!-- Lenses will be populated here -->
              </select>
            </div>
          </div>
        </div>
        
        <div class="final-quote-container" id="finalQuoteContainer" style="margin-top: 30px;">
          <a class="cta-button" href="#" id="proceedToPhysicalBtn">Continue →</a>
        </div>
      </div>
    </div>
    
    <div class="evaluation-sidebar">
      <h3 class="sidebar-title">Device Evaluation</h3>
      <img alt="Camera Image" class="product-image-sidebar" id="evaluationImage" src="https://via.placeholder.com/150">
      <h4 class="sidebar-model" id="evaluationModel">Device Model</h4>
      <hr class="sidebar-divider">
      <div id="evaluation-summary-list">
        </div>
    </div>
    
  </div> </div>
<script src="js/state-helper.js"></script>

<!-- Firebase (load first without defer) -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>

<!-- Lens Compatibility Systems -->
<script src="js/lens-compatibility.js"></script>
<script src="js/lens-compatibility-dynamic.js"></script>
<script src="js/lens-compatibility-smart.js"></script>

<!-- Lens Selection Logic -->
<script src="js/lens-selection.js"></script>
<script defer src="js/firebase-config.js"></script>
<script defer src="js/login.js"></script>
</body>
</html>
