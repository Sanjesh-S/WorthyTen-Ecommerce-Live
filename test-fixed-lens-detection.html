<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Fixed Lens Detection</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #333; margin-bottom: 30px; }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin: 20px 0;
        }
        button:hover { transform: translateY(-2px); }
        .results {
            margin-top: 30px;
        }
        .test-item {
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #ddd;
        }
        .test-item.fixed {
            background: #fff3cd;
            border-left-color: #ffc107;
        }
        .test-item.interchangeable {
            background: #d4edda;
            border-left-color: #28a745;
        }
        .camera-name { font-weight: bold; font-size: 16px; }
        .camera-status { color: #666; font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Test Fixed Lens Detection</h1>
        <p style="color: #666; margin-bottom: 30px;">
            This tests which cameras will show the "additional lens" question
        </p>
        
        <button onclick="runTest()">🚀 Run Detection Test</button>
        
        <div id="results" class="results"></div>
    </div>

    <script src="js/lens-compatibility-smart.js"></script>

    <script>
        function runTest() {
            const testCameras = [
                // Canon Fixed Lens
                { brand: 'Canon', name: 'Canon PowerShot G7 X Mark III' },
                { brand: 'Canon', name: 'Canon G7 X Mark III' },
                
                // Canon Interchangeable
                { brand: 'Canon', name: 'Canon EOS 5D Mark II' },
                { brand: 'Canon', name: 'Canon EOS 90D' },
                { brand: 'Canon', name: 'Canon EOS 100D' },
                { brand: 'Canon', name: 'Canon EOS M50 Mark I' },
                { brand: 'Canon', name: 'Canon EOS R5' },
                
                // Nikon Fixed Lens
                { brand: 'Nikon', name: 'Nikon Coolpix P950' },
                { brand: 'Nikon', name: 'Nikon Coolpix P1000' },
                
                // Nikon Interchangeable
                { brand: 'Nikon', name: 'Nikon D850' },
                { brand: 'Nikon', name: 'Nikon D7500' },
                { brand: 'Nikon', name: 'Nikon Z6 II' },
                
                // Sony Fixed Lens
                { brand: 'Sony', name: 'Sony RX100 VII' },
                { brand: 'Sony', name: 'Sony ZV-1' },
                { brand: 'Sony', name: 'Sony HX99' },
                
                // Sony Interchangeable
                { brand: 'Sony', name: 'Sony A7 III' },
                { brand: 'Sony', name: 'Sony A6400' },
                { brand: 'Sony', name: 'Sony A99 II' },
                
                // Fujifilm Fixed Lens
                { brand: 'Fujifilm', name: 'Fujifilm X100V' },
                { brand: 'Fujifilm', name: 'Fujifilm X70' },
                
                // Fujifilm Interchangeable
                { brand: 'Fujifilm', name: 'Fujifilm X-T4' },
                { brand: 'Fujifilm', name: 'Fujifilm X-H2' }
            ];

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<h3>Test Results:</h3>';

            testCameras.forEach(camera => {
                const mountInfo = window.detectCameraMountSmart(camera.brand, camera.name);
                const isFixed = mountInfo && mountInfo.mountType === 'fixedLens';
                
                const className = isFixed ? 'fixed' : 'interchangeable';
                const icon = isFixed ? '🔒' : '🔄';
                const status = isFixed ? 
                    'Fixed Lens - Additional lens question HIDDEN ✅' : 
                    `${mountInfo ? mountInfo.mountType : 'Unknown'} - Additional lens question SHOWN ✅`;
                
                resultsDiv.innerHTML += `
                    <div class="test-item ${className}">
                        <div class="camera-name">${icon} ${camera.name}</div>
                        <div class="camera-status">${status}</div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
