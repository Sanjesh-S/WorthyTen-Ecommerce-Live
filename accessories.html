<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>WorthyTen - Select Accessories</title>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="css/style.css" rel="stylesheet"/>
</head>
<body data-step="6">
<div id="header"></div>
<div class="steps-bar-track"><div class="steps-bar-fill" id="stepsFill"></div></div>

<script src="js/header.js"></script>
<script src="js/ui.js"></script>
<div class="main-container">

  <div class="assessment-layout">

    <div class="assessment-card">
      <div class="product-header">
      <a class="back-button" href="#" id="backToIssues">← Back</a>
      <h1 class="page-title" style="text-align: center; margin-bottom: 30px;">Select all accessories details</h1>
      </div>
      <div class="assessment-body">
        <div class="row between items-center" style="margin-bottom:12px">
          <button class="chip" id="noAccessoriesBtn" type="button">No accessories</button>
          <small class="muted">Add the items you have — each gives a bonus.</small>
        </div>
        <div class="issues-grid" id="accessoriesGrid"></div>
        
        <div class="final-quote-container" id="finalQuoteContainer">
          <h3 class="hidden">Your Final Offer</h3>
          <p class="final-price hidden" id="finalPrice"></p>
          <a class="cta-button" href="#" id="proceedToWarrantyBtn">Next →</a>
        </div>
      </div>
    </div>
    
    <div class="evaluation-sidebar">
      <h3 class="sidebar-title">Device Evaluation</h3>
      <img alt="Camera Image" class="product-image-sidebar" id="evaluationImage" src="https://via.placeholder.com/150">
      <h4 class="sidebar-model" id="evaluationModel">Device Model</h4>
      <hr class="sidebar-divider">
      <div id="evaluation-summary-list">
        </div>
    </div>
    
  </div> </div>
<script src="js/state-helper.js"></script>
<script src="js/category-config.js"></script>
<script src="js/variant-config.js"></script>
<script src="js/display-helper.js"></script>
<script src="js/accessories.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script defer src="js/firebase-config.js"></script>
  <script defer src="js/login.js"></script>
</body>
</html>
