<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>WorthyTen - Warranty Condition</title>
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
  <link href="css/style.css" rel="stylesheet"/>
</head>
<body data-step="7">
  <div id="header"></div>

  <div class="steps-bar-track"><div class="steps-bar-fill" id="stepsFill"></div></div>

  <script src="js/header.js"></script>
  <script src="js/ui.js"></script>

  <div class="main-container">
    <div class="warranty-card">
      <div class="evaluating-header">
        <img alt="Camera" class="evaluating-image" id="deviceImage" src="https://via.placeholder.com/80"/>
        <div class="evaluating-details">
          <span class="evaluating-title">Evaluating</span>
          <h1 class="evaluating-device-name" id="deviceName"></h1>
        </div>
      </div>

      <div class="warranty-body">
        <h2 class="section-title">Age of the Device</h2>
        <div class="age-options">
          <label class="radio-option">
            <input name="device_age" type="radio" value="under_11"/>
            <span class="radio-label">0-11 Months</span>
            <span class="radio-sublabel">Valid bill mandatory</span>
          </label>
          <label class="radio-option">
            <input checked name="device_age" type="radio" value="over_11"/>
            <span class="radio-label">Above 11 Months</span>
          </label>
        </div>

        <div class="final-quote-container" id="finalQuoteDisplay">
            <h3 class="hidden">Final Price</h3>
            <p class="final-price hidden" id="finalPrice"></p>
            <a class="cta-button" href="#" id="finishBtn">Finish</a>
        </div>
      </div>
    </div>
  </div>

  <div id="recaptcha-container" style="display: none;"></div>

  <!-- Login Modal -->
  <div id="simple-login-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000; align-items: center; justify-content: center;">
    <div style="background: white; padding: 32px; border-radius: 16px; max-width: 400px; width: 90%; position: relative;">
      <button id="login-modal-close" style="position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 24px; cursor: pointer; color: #666;">×</button>
      
      <h2 style="margin-top: 0; margin-bottom: 8px;">Login Required</h2>
      <p style="margin-top: 0; margin-bottom: 24px; color: #666;">Please verify your phone number to see the final price.</p>

      <div id="login-step-phone">
        <div class="form-group">
          <label for="login-phone" style="font-weight: 600;">Enter mobile number</label>
          <div class="phone-input-group">
            <span class="phone-prefix">+91</span>
            <input id="login-phone" type="tel" class="form-input" placeholder="Enter 10-digit mobile" maxlength="10" />
          </div>
        </div>
        <div class="pickup-modal-actions" style="justify-content: center; margin-top: 12px;">
          <button id="send-otp-btn" class="cta-button" style="width: 100%;">Send OTP</button>
        </div>
      </div>

      <div id="login-step-otp" style="display:none; margin-top:12px;">
        <div class="form-group">
          <label for="login-otp" style="font-weight: 600;">Enter 6-digit OTP</label>
          <input id="login-otp" type="tel" class="form-input" maxlength="6" placeholder="123456" />
        </div>
        <div class="pickup-modal-actions" style="justify-content: center; margin-top: 12px;">
          <button id="verify-otp-btn" class="cta-button" style="width: 100%;">Verify & Login</button>
        </div>
        <a href="#" id="resend-otp-link" style="text-align: center; display: block; margin-top: 16px; font-size: 14px;">Resend OTP</a>
      </div>

      <div id="login-error" style="color:var(--danger); margin-top:16px; display:none; text-align:center;"></div>
      <div id="login-success" style="color:var(--ok); margin-top:16px; display:none; text-align:center;"></div>
    </div>
  </div>

  <script defer src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script> <script defer src="js/firebase-config.js"></script>
  <script defer src="js/login.js"></script>
  
  <script defer src="js/state-helper.js"></script>
  <script defer src="js/warranty.js"></script>
  
</body>
</html>
